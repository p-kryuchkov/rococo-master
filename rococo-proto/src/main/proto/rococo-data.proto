syntax = "proto3";

package io.student.grpc.rococo;

option  java_multiple_files = true;
option  java_package = "io.student.rococo.grpc";
option  java_outer_classname = "RococoDataProto";

message IdRequest{
  string id =1;
}
message PageableRequest{
  optional  int32 page = 1;
  optional  int32 size = 2;
  optional string sort_by = 3;
  optional SortDirection sort_dir = 4;
}

enum SortDirection {
  SORT_DIRECTION_UNSPECIFIED = 0;
  ASC = 1;
  DESC = 2;
}
