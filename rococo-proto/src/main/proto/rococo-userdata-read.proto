syntax = "proto3";

package io.student.grpc.rococo;

option  java_multiple_files = true;
option  java_package = "io.student.rococo.grpc";
option  java_outer_classname = "RococoUserDataProto";

service UserdataReadService{
  rpc GetUserByUsername(UsernameRequest) returns (UserResponse);
}

message UsernameRequest{
  string username = 1;
}

message UserResponse{
  string id = 1;
  string username = 2;
  string firstname = 3;
  string lastname = 4;
  bytes avatar = 5;
}