server:
  port: 8080

spring:
  application:
    name: rococo-gateway

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO

grpc:
  client:
    grpcDataClient:
      max-inbound-message-size: 10485760
      negotiationType: PLAINTEXT
    grpcUserdataPublicClient:
      negotiationType: PLAINTEXT

---
spring:
  config:
    activate:
      on-profile: 'local'
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: 'http://localhost:9000'

kafka:
  bootstrap-servers: 'localhost:9092'

grpc:
  client:
    grpcDataClient:
      address: 'static://localhost:8093'
    grpcUserdataPublicClient:
      address: 'static://localhost:8094'

rococo-front:
  base-uri: 'http://localhost:3000'

---
spring:
  config:
    activate:
      on-profile: 'docker'
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: 'http://auth.rococo.dc:9000'
kafka:
  bootstrap-servers: 'kafka:9092'

grpc:
  client:
    grpcDataClient:
      address: 'static://data.rococo.dc:8093'
    grpcUserdataPublicClient:
      address: 'static://userdata.rococo.dc:8094'

rococo-front:
  base-uri: 'http://frontend.rococo.dc'